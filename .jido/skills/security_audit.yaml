name: security_audit
description: Comprehensive security audit — scan project structure, then deep-dive in parallel
steps:
  - name: map_codebase
    template: researcher
    task: |
      Map the full project structure focusing on security-relevant code:
      1. Authentication/authorization modules
      2. API endpoints and controllers
      3. Database queries and ORM usage
      4. Shell/command execution code
      5. File upload/download handlers
      6. Configuration and secrets management
      7. Third-party integrations
      List every file path that handles user input, auth, or sensitive operations.
  - name: audit_code
    template: reviewer
    depends_on: [map_codebase]
    task: |
      Using the project map from the previous step, perform a deep security audit:
      1. Check every file that handles user input for injection vulnerabilities
      2. Check auth code for bypass possibilities
      3. Check for hardcoded secrets (grep for API keys, passwords, tokens)
      4. Check CORS, CSP, and security header configuration
      5. Check for SSRF in any HTTP client code
      6. Check for path traversal in file operations
      7. Rate each finding: CRITICAL/HIGH/MEDIUM/LOW with file:line reference
synthesis: |
  Produce a security audit report with:
  - Executive summary (1 paragraph)
  - Critical findings (must fix immediately)
  - High findings (fix before next release)
  - Medium findings (fix soon)
  - Low findings (fix when convenient)
  - Overall security posture assessment
  Format as a structured report with clear severity labels and remediation steps.
